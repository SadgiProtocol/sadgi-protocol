[advisories]
ignore = ["RUSTSEC-2024-0436", "RUSTSEC-2025-0134"]

[licenses]
# We want to be very strict with licenses.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
private = { ignore = true }
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
highlight = "all"
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

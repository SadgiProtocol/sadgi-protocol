# cargo-audit configuration
# These advisories are in transitive dependencies of soroban-sdk v20.x
# that we cannot upgrade until the upstream SDKs release compatible versions.
# They are tracked and will be resolved when we migrate to newer SDK versions.

[advisories]
ignore = [
    "RUSTSEC-2025-0056",   # adler: unmaintained (soroban-wasmi dep)
    "RUSTSEC-2026-0097",   # rand 0.8: unsound (soroban dep)
]

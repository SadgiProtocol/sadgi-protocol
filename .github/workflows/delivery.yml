name: Sadgi Protocol Delivery Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Format check — no compilation needed, runs fast
  # ─────────────────────────────────────────────────────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Verify the workspace Cargo graph resolves without errors.
  # We do NOT compile external crates here, so SDK version skew is irrelevant.
  # ─────────────────────────────────────────────────────────────────────────────
  resolve:
    name: Dependency Resolution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify workspace resolves
        run: cargo metadata --format-version 1 --locked > /dev/null

      - name: Dependency Audit
        run: |
          cargo install cargo-audit --locked
          cargo audit --config audit.toml

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build our own crate code only (no external deps compiled in CI).
  # Uses --no-deps so cargo doc only compiles workspace members.
  # ─────────────────────────────────────────────────────────────────────────────
  docs:
    name: Documentation Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build workspace docs
        run: cargo doc --no-deps --workspace --locked
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Build the Soroban smart contracts (WASM only, no RISC Zero)
  # Soroban contracts compile to wasm32 which avoids most host-side dep issues.
  # ─────────────────────────────────────────────────────────────────────────────
  contracts:
    name: Build Contracts (Soroban WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build marketplace contract
        run: cargo build -p sadgi-marketplace --target wasm32-unknown-unknown --release --locked

      - name: Build governance contract
        run: cargo build -p sadgi-governance --target wasm32-unknown-unknown --release --locked

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Deploy docs to GitHub Pages (separate, always runs on main)
  # ─────────────────────────────────────────────────────────────────────────────
  docker-publish:
    name: Build & Publish Prover Image
    needs: [fmt, resolve, docs, contracts]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/sadgi-prover:latest
          target: prover

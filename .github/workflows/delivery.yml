name: Sadgi Protocol Delivery Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Format check
  # ─────────────────────────────────────────────────────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.79.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.79.0
          components: rustfmt

      - name: Check formatting (Contracts)
        run: cargo fmt --all -- --check
        
      - name: Check formatting (Prover)
        run: cd prover && cargo fmt --all -- --check

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Clippy & Build (Contracts)
  # ─────────────────────────────────────────────────────────────────────────────
  contracts-checks:
    name: Contracts Workspace Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.79.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.79.0
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        
      - name: Test
        run: cargo test --workspace

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Clippy & Build (Prover)
  # ─────────────────────────────────────────────────────────────────────────────
  prover-checks:
    name: Prover Workspace Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.79.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.79.0
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        
      - name: Install SP1 CLI & Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          curl -L https://sp1.succinct.xyz | bash && ~/.sp1/bin/sp1up
        
      - name: Clippy
        run: cd prover && cargo clippy --workspace --all-targets -- -D warnings
        
      - name: Test
        run: cd prover && cargo test --workspace

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Dependency Audit
  # ─────────────────────────────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.79.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.79.0

      - name: Cargo Audit
        run: |
          cargo install cargo-audit --locked
          cargo audit --file audit.toml

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Docker publish
  # ─────────────────────────────────────────────────────────────────────────────
  docker-publish:
    name: Build & Publish Prover Image
    needs: [fmt, contracts-checks, prover-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/sadgi-protocol/sadgi-prover:latest" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          target: prover

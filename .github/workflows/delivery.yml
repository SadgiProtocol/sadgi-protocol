name: Sadgi Protocol Delivery Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Format & Lint
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Formatting & Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.81.0
          components: rustfmt, clippy

      - name: Cache Root Workspace
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          
      - name: Cache Prover Workspace
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "prover"

      - name: Check formatting
        run: |
          cargo fmt --all -- --check
          cd prover && cargo fmt --all -- --check

      - name: Install SP1 CLI
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          curl -L https://sp1.succinct.xyz | bash && ~/.sp1/bin/sp1up

      - name: Clippy (Root Workspace)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
        
      - name: Clippy (Prover Workspace)
        run: cd prover && cargo clippy --workspace --all-targets --locked -- -D warnings

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build & Test (Matrix)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Build & Test
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [1.81.0, stable]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install SP1 CLI
        run: |
          curl -L https://sp1.succinct.xyz | bash && ~/.sp1/bin/sp1up

      - name: Test Root Workspace
        run: cargo test --workspace --locked

      - name: Test Prover Workspace
        run: cd prover && cargo test --workspace --locked

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Security & Dependency Audit (cargo-deny)
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cargo Deny
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check
          arguments: --workspace
          manifest-path: Cargo.toml
      - name: Cargo Deny (Prover)
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check
          arguments: --workspace
          manifest-path: prover/Cargo.toml

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Docker Publish
  # ─────────────────────────────────────────────────────────────────────────────
  docker-publish:
    name: Build & Publish Images
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/sadgi-protocol/sadgi-prover:latest" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          target: prover
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

name: Deploy Sadgi Documentation to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Docs & Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Build mdBook documentation ──────────────────────────────────────
      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.4.37'

      - name: Build Docs with mdBook
        run: mdbook build docs
        # Output: docs/book/

      # ── 2. Build Next.js dashboard as a static export ──────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Dashboard dependencies
        run: npm install
        working-directory: dashboard

      - name: Build Dashboard (static export)
        run: npm run build
        working-directory: dashboard
        env:
          NODE_ENV: production
        # Output: dashboard/out/

      # ── 3. Combine: docs at root, dashboard at /app ─────────────────────────
      - name: Combine into single artifact
        run: |
          # Copy dashboard static export into docs/book/app/
          mkdir -p docs/book/app
          cp -r dashboard/out/. docs/book/app/

          # Prevent GitHub Jekyll processing (critical for mdBook assets)
          touch docs/book/.nojekyll

          echo "=== Final site structure ==="
          find docs/book -maxdepth 2 -type d

      # ── 4. Upload & Deploy ──────────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/book'

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
